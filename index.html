<script>
// ── EmailJS config ─────────────────────────────────────
// 1. Crie conta gratuita em emailjs.com
// 2. Crie um Service (Gmail/Outlook) e copie o Service ID
// 3. Crie um Template com variáveis: {{numero}}, {{solicitante}}, {{setor}}, {{itens}}, {{to_email}}
// 4. Copie Public Key, Service ID e Template ID abaixo
const EJS_KEY           = 'l9GUxEfJ_zsflZSnz';
const EJS_SERVICE       = 'service_n8i9prl';
const EJS_TEMPLATE      = 'template_0rzcrc8';   // Op.Estoque — novo pedido
const EJS_TEMPLATE_SOLIC= 'template_pzimdp9';   // Solicitante — status
if(EJS_KEY)(typeof emailjs!=='undefined')&&emailjs.init({publicKey:EJS_KEY});

// Variáveis disponíveis no template EmailJS:
//   {{to_email}}, {{to_name}}, {{numero}}, {{solicitante}}, {{setor}},
//   {{prioridade}}, {{status}}, {{mensagem}}, {{itens}}

async function notificarEstoque(pedido){
  if(!EJS_KEY||!EJS_SERVICE||!EJS_TEMPLATE)return;
  try{
    const users=await dbGetAll('usuarios');
    const ops=users.filter(u=>['estoque','suprimentos','admin'].includes(u.perfil)&&u.ativo);
    const itensStr=(pedido.itens||[]).map(i=>`${i.produtoNome||'?'} — ${i.qtd} ${i.unidade||'UN'}`).join('\n');
    for(const u of ops){
      await emailjs.send(EJS_SERVICE,EJS_TEMPLATE,{
        to_email:u.email,to_name:u.nome,
        numero:pedido.numero,solicitante:pedido.solicitante,
        setor:pedido.setor,prioridade:pedido.prioridade||'Normal',
        status:'Pendente',itens:itensStr,
        mensagem:'Novo pedido aguardando separação.',
      });
    }
  }catch(e){console.warn('Email estoque não enviado:',e.message);}
}

const STATUS_MSG={
  'Pendente':     'Seu pedido foi criado e está aguardando processamento pela equipe de estoque.',
  'Em Separação': 'Boa notícia! Seu pedido está sendo separado pela equipe de estoque.',
  'Entregue':     'Pedido entregue! Os itens já estão disponíveis no seu setor.',
  'Cancelado':    'Seu pedido foi cancelado. Entre em contato com o estoque para mais informações.',
};

async function notificarSolicitante(pedido, status){
  if(!EJS_KEY||!EJS_SERVICE||!EJS_TEMPLATE_SOLIC)return;
  if(!pedido.solicitanteEmail)return;
  try{
    const itensStr=(pedido.itens||[]).map(i=>`${i.produtoNome||'?'} — ${i.qtd} ${i.unidade||'UN'}`).join('\n');
    await emailjs.send(EJS_SERVICE,EJS_TEMPLATE_SOLIC,{
      to_email:pedido.solicitanteEmail,to_name:pedido.solicitante,
      numero:pedido.numero,solicitante:pedido.solicitante,
      setor:pedido.setor,prioridade:pedido.prioridade||'Normal',
      status,itens:itensStr,
      mensagem:STATUS_MSG[status]||'Status do seu pedido foi atualizado.',
    });
  }catch(e){console.warn('Email solicitante não enviado:',e.message);}
}
</script>
<!-- Crypto de senha: Web Crypto API nativa (PBKDF2) — sem CDN externo -->
<script>
// Interface compatível com bcryptjs usando Web Crypto API (PBKDF2-SHA256)
const bcrypt = (() => {
  const enc = new TextEncoder();
  function buf2hex(b){ return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join(''); }
  function hex2buf(h){ const a=new Uint8Array(h.length/2); for(let i=0;i<a.length;i++)a[i]=parseInt(h.slice(i*2,i*2+2),16); return a.buffer; }
  async function derive(password, saltHex){
    const key = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveBits']);
    const bits = await crypto.subtle.deriveBits({ name:'PBKDF2', salt:hex2buf(saltHex), iterations:100000, hash:'SHA-256' }, key, 256);
    return buf2hex(bits);
  }
  return {
    async hash(password){
      const salt = buf2hex(crypto.getRandomValues(new Uint8Array(16)).buffer);
      const hash = await derive(password, salt);
      return salt + ':' + hash;
    },
    async compare(password, stored){
      try {
        const [salt, hash] = stored.split(':');
        const derived = await derive(password, salt);
        return derived === hash;
      } catch { return false; }
    }
  };
})();
</script>

<!-- ═══════ LOGIN ═══════ -->
<div id="loginScreen">
  <div class="lbox">
    <div class="llogo">
      <svg viewBox="0 0 160 52" xmlns="http://www.w3.org/2000/svg" style="height:52px;width:auto">
        <text x="0" y="40" font-family="Raleway,sans-serif" font-weight="800" font-size="42" fill="#0d2255">MR</text>

        <text x="141" y="34" font-family="Raleway,sans-serif" font-weight="800" font-size="20" fill="#0d2255" text-anchor="middle">O</text>
      </svg>
    </div>
    <div class="ltabs">
      <div class="ltab active" id="tabL" onclick="switchTab('login')">Entrar</div>
      <div class="ltab" id="tabR" onclick="switchTab('reg')">Novo Usuário</div>
    </div>
    <div id="lmsg" class="lerr"></div>

    <!-- Login -->
    <div id="fLogin">
      <div class="fgp" style="margin-bottom:12px"><label>E-mail</label>
        <input type="email" id="lEmail" placeholder="seu@email.com" autocomplete="username" onkeydown="if(event.key==='Enter')login()"/></div>

async function sbFetch(path, {method='GET', body, prefer, noBody=false}={}){
  const headers={
    'apikey': SB_KEY,
    'Authorization': 'Bearer '+SB_KEY,
    'Content-Type': 'application/json',
  };
  if(prefer) headers['Prefer']=prefer;
  const r=await fetch(SB_URL+'/rest/v1/'+path,{
    method, headers,
    ...(body!==undefined?{body:JSON.stringify(body)}:{})
  });
  if(!r.ok){ const t=await r.text(); throw new Error(t); }
  if(noBody||method==='DELETE') return null;
  const ct=r.headers.get('content-type')||'';
  return ct.includes('json')?r.json():null;
}

async function dbGet(table,id){
  const rows=await sbFetch(`${table}?id=eq.${id}&limit=1`);

}

async function dbSave(table,obj){
  const {id,...rest}=obj;
  if(id){
    await sbFetch(`${table}?id=eq.${id}`,{method:'PATCH',body:rest,noBody:true});
    return obj;
  }
  const rows=await sbFetch(table,{method:'POST',body:rest,prefer:'return=representation'});
  return rows?.[0]||obj;
}

async function dbAdd(table,obj){
  const rows=await sbFetch(table,{method:'POST',body:obj,prefer:'return=representation'});

}

  const el=document.getElementById('lmsg');
  if(!msg){el.classList.remove('vis');return;}
  el.textContent=msg;
  el.className='lerr vis'+(ok?' lsuc':'');
}

async function login(){
  const email=document.getElementById('lEmail').value.trim().toLowerCase();
  const senha=document.getElementById('lSenha').value;
  if(!email||!senha){lmsg('Informe e-mail e senha.');return;}
  try{
    const users=await dbGetAll('usuarios');
    const u=users.find(x=>x.email===email);
    if(!u){lmsg('Usuário não encontrado.');return;}
    if(!u.ativo){lmsg('Acesso pendente de aprovação. Aguarde um administrador ativar sua conta.');return;}
    const ok=await bcrypt.compare(senha,u.senha);
    if(!ok){lmsg('E-mail ou senha incorretos.');return;}
    const sess={id:u.id,nome:u.nome,email:u.email,perfil:u.perfil};
    sessionStorage.setItem('mro_sess',JSON.stringify(sess));
    CU=sess;
    startApp();
  }catch(e){lmsg(e.message);}
}

async function registrar(){
  const nome=document.getElementById('rNome').value.trim();
  const email=document.getElementById('rEmail').value.trim().toLowerCase();
  const senha=document.getElementById('rSenha').value;
  if(!nome||!email||!senha){lmsg('Preencha todos os campos.');return;}
  if(senha.length<6){lmsg('Senha deve ter ao menos 6 caracteres.');return;}
  try{
    const users=await dbGetAll('usuarios');
    if(users.find(x=>x.email===email)){lmsg('E-mail já cadastrado.');return;}
    const hash=await bcrypt.hash(senha);
    await dbAdd('usuarios',{nome,email,senha:hash,perfil:'solicitante',ativo:false,criadoEm:now()});
    lmsg(`✓ Solicitação enviada! Aguarde aprovação de um administrador.`,true);
    setTimeout(()=>switchTab('login'),2500);
  }catch(e){lmsg(e.message);}
}

  document.getElementById('pageTitle').textContent=PAGE_TITLES[page]||page;
  document.querySelectorAll('.ni').forEach(el=>el.classList.toggle('active',el.dataset.p===page));
  const el=document.getElementById('content');

  (PAGES[page]?.(el))?.catch(e=>{el.innerHTML=`<div class="alert al-d">${escH(e.message)}</div>`;});
}

async function nextProdCode(){
  const all=await dbGetAll('produtos');
  if(!all.length)return'PROD-0001';
  const max=all.reduce((a,b)=>{
    const n=parseInt((b.codigo||'').replace(/\D/g,''),10);
    return isNaN(n)?a:Math.max(a,n);
  },0);
  return'PROD-'+String(max+1).padStart(4,'0');
}

async function nextPedNum(){
  const all=await dbGetAll('pedidos');
  if(!all.length)return'PED-0001';
  const max=all.reduce((a,b)=>{
    const n=parseInt((b.numero||'').replace('PED-',''),10);
    return isNaN(n)?a:Math.max(a,n);
  },0);
  return 'PED-'+String(max+1).padStart(4,'0');
}

const PAGES = {};

/* ─── DASHBOARD & BI (unificado) ───────────────── */
// helpers SVG
function svgDonut(segments,cx,cy,r,stroke){
  // segments: [{pct, color, label}]
  let total=segments.reduce((s,x)=>s+x.pct,0)||1;
  let angle=-90,paths='';
  segments.forEach(s=>{
    const sweep=s.pct/total*360;
    if(sweep===0)return;
    const r1=angle*Math.PI/180, r2=(angle+sweep)*Math.PI/180;
    const x1=cx+r*Math.cos(r1),y1=cy+r*Math.sin(r1);
    const x2=cx+r*Math.cos(r2),y2=cy+r*Math.sin(r2);
    const lg=sweep>180?1:0;
    paths+=`<path d="M${cx},${cy} L${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 ${lg},1 ${x2.toFixed(1)},${y2.toFixed(1)} Z" fill="${s.color}" stroke="#fff" stroke-width="${stroke||2}"/>`;
    angle+=sweep;
  });
  return paths;
}
function barChart(items,maxVal,colors,w,h,barH){
  // items [{label,val,color}]
  const pad=8,lw=160;
  return items.map((it,i)=>{
    const bw=Math.max(0,(it.val/maxVal)*((w-lw-pad*3)));
    const y=i*(barH+6);
    return `<g transform="translate(0,${y})">
      <text x="${lw-6}" y="${barH/2+4}" text-anchor="end" font-size="11" fill="#3a4a7a" font-family="Raleway,sans-serif">${it.label}</text>
      <rect x="${lw}" y="0" width="${(w-lw-pad)}" height="${barH}" rx="2" fill="#f4f6fb"/>
      <rect x="${lw}" y="0" width="${bw}" height="${barH}" rx="2" fill="${it.color}"/>
      <text x="${lw+bw+5}" y="${barH/2+4}" font-size="11" fill="#3a4a7a" font-family="Raleway,sans-serif">${it.valFmt||it.val}</text>
    </g>`;
  }).join('');
}

window.marioWidgetInit=function(){
  const w=document.getElementById('mario-widget');
  if(!w)return;
  w.style.display='block';
  const hasKey=!!localStorage.getItem('mario_groq_key');
  // status dot
  const dot=document.getElementById('mario-dot');
  const st=document.getElementById('mario-status');
  if(dot)dot.style.background=hasKey?'#4ade80':'#f59e0b';
  if(st)st.innerHTML=`<span id="mario-dot" style="width:6px;height:6px;border-radius:50%;background:${hasKey?'#4ade80':'#f59e0b'};animation:blink 1.5s infinite;flex-shrink:0;display:inline-block"></span>${hasKey?'IA ativa · Groq (Llama 3)':'Sem chave — modo básico'}`;
  // key input
  const ki=document.getElementById('mario-key-inp');
  if(ki)ki.value=localStorage.getItem('mario_groq_key')||'';
  if(hasKey){const s=document.getElementById('mario-setup');if(s)s.style.display='none';}
  // saudação inicial
  const msgs=document.getElementById('mario-msgs');
  if(msgs&&!msgs.dataset.init){
    msgs.dataset.init='1';
    const typing=document.getElementById('mario-typing');
    const greet=document.createElement('div');
    greet.className='mario-msg bot';
    greet.innerHTML=`<div class="mario-msg-av">🤖</div><div class="mario-bubble">${hasKey?'Olá! Sou o <strong>Mario</strong> 🤖 — sua IA de estoque.\nPosso responder perguntas, criar pedidos e auditar o sistema.\n\nExperimente:':'Olá! Sou o <strong>Mario</strong> 👋\nSem chave Groq, respondo perguntas básicas.\nClique em ⚙ Groq para ativar a IA completa.\n\nExperimente:'}<div class="mario-chips"><span class="mario-chip" onclick="marioChip(this)">Temos quantos parafusos?</span><span class="mario-chip" onclick="marioChip(this)">Quais estão abaixo do mínimo?</span><span class="mario-chip" onclick="marioChip(this)">Valor total do estoque</span><span class="mario-chip" onclick="marioChip(this)">Produtos com saldo zero</span><span class="mario-chip" onclick="marioChip(this)">Resumo por categoria</span><span class="mario-chip" style="background:#fef2f2;color:#991b1b;border-color:#fca5a5" onclick="marioRunQA()">🔍 Executar QA do sistema</span></div></div>`;
    msgs.insertBefore(greet, typing);
  }
  _marioListening=false;
  window._marioSpeakEnabled=true;
  if(_marioRecog){try{_marioRecog.abort();}catch(e){}_marioRecog=null;}
  const micBtn=document.getElementById('mario-mic');
  if(micBtn){micBtn.classList.remove('listening','asking');}

  Promise.all([dbGetAll('produtos'),dbGetAll('movimentos'),dbGetAll('pedidos')]).then(([p,m,pd])=>{
    _marioCtx={prods:p,movs:m,pedidos:pd};
  }).catch(()=>{});
};

let _acSel=-1;
// stopwords que NÃO são nomes de produto
const _AC_STOPS=new Set(['quero','preciso','pedir','solicitar','comprar','pega','pegar','trazer','buscar','queria','gostaria','de','do','da','um','uma','uns','umas','o','a','os','as','me','que','por','para','com','sem','mais','menos','esse','essa','estes','estas','aquele','aquela']);

function _acExtractQuery(val){
  if(!val)return '';
  // se termina com espaço → palavra concluída → esconde lista
  if(val.endsWith(' '))return '';
  const words=val.trim().toLowerCase().split(/\s+/);
  // última palavra: sempre usa (é a palavra em digitação, nunca filtra como stopword)
  const lastWord=words[words.length-1];
  if(lastWord.length<2)return '';
  // palavras anteriores: filtra stopwords e combina para busca mais precisa
  const prev=words.slice(0,-1).filter(w=>w.length>=2&&!_AC_STOPS.has(w));
  return prev.length?prev.join(' ')+' '+lastWord:lastWord;
}

window.marioAutocomp=function(val){
  const box=document.getElementById('mario-autocomplete');
  if(!box)return;
  const q=_acExtractQuery(val);
  if(q.length<2){box.classList.remove('open');box.innerHTML='';_acSel=-1;return;}
  const prods=_marioCtx?.prods||[];
  const matches=prods.filter(p=>{
    const n=(p.nome||'').toLowerCase();
    const c=(p.codigo||'').toLowerCase();
    return n.includes(q)||c.includes(q);
  }).slice(0,7);
  if(!matches.length){box.classList.remove('open');box.innerHTML='';_acSel=-1;return;}
  box.innerHTML=matches.map((p,i)=>{
    const foto=p.foto?`<img src="${p.foto}" class="mario-ac-foto" onerror="this.outerHTML='<div class=mario-ac-foto>📦</div>'"/>`:`<div class="mario-ac-foto">📦</div>`;
    const saldo=p.saldo!=null?`saldo: <strong>${p.saldo}</strong> ${p.unidade||''}`.trim():'sem saldo';
    return `<div class="mario-ac-item" data-nome="${escH(p.nome)}" data-id="${p.id}" data-q="${escH(q)}" onclick="marioAcSelect(this)">
      ${foto}
      <div class="mario-ac-txt"><span class="mario-ac-nome">${escH(p.nome)}</span><span class="mario-ac-sub">${escH(p.codigo||'')} · ${saldo}</span></div>
    </div>`;
  }).join('');
  box.classList.add('open');
  _acSel=-1;
};

window.marioAcSelect=function(el){
  const nome=el.dataset.nome;
  const q=el.dataset.q||'';
  const inp=document.getElementById('mario-txt');
  if(inp){
    // substitui apenas a parte da query no final do texto, mantendo o prefixo
    const val=inp.value;
    const lower=val.toLowerCase();
    const qi=lower.lastIndexOf(q);
    const prefix=qi>=0?val.slice(0,qi):val.replace(/\S+\s*$/,'');
    inp.value=(prefix+nome).trim();
    inp.style.height='auto';
    inp.style.height=Math.min(inp.scrollHeight,90)+'px';
    inp.focus();
  }
  const box=document.getElementById('mario-autocomplete');
  if(box){box.classList.remove('open');box.innerHTML='';}
  _acSel=-1;
};
window.marioTxtKey=function(e){
  const box=document.getElementById('mario-autocomplete');
  const items=box?.querySelectorAll('.mario-ac-item')||[];
  if(box?.classList.contains('open')&&items.length){
    if(e.key==='ArrowDown'){e.preventDefault();_acSel=(_acSel+1)%items.length;items.forEach((x,i)=>x.classList.toggle('sel',i===_acSel));return;}
    if(e.key==='ArrowUp'){e.preventDefault();_acSel=(_acSel-1+items.length)%items.length;items.forEach((x,i)=>x.classList.toggle('sel',i===_acSel));return;}
    if(e.key==='Enter'&&_acSel>=0){e.preventDefault();marioAcSelect(items[_acSel]);return;}
    if(e.key==='Escape'){box.classList.remove('open');box.innerHTML='';_acSel=-1;return;}
  }
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();marioSend();}
};

// ── pré-processa localmente e monta contexto MÍNIMO para a IA ────
function marioBuildContext(pergunta, prods, movs, pedidos){
  const norm=s=>(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
  const ql=norm(pergunta);
  const moeda=v=>`R$${fmt(v,2)}`;

  // resumo geral (sempre incluso — ~150 tokens)
  const totalVal=prods.reduce((s,p)=>s+(p.preco||0)*p.saldo,0);
  const abaixoMin=prods.filter(p=>p.saldo<p.minimo&&p.minimo>0);
  const semEst=prods.filter(p=>p.saldo<=0);
  const pedAbertos=pedidos.filter(p=>p.status==='Pendente'||p.status==='Em Separação');
  const resumo=`RESUMO: ${prods.length} produtos | valor_total:${moeda(totalVal)} | abaixo_min:${abaixoMin.length} | sem_estoque:${semEst.length} | pedidos_abertos:${pedAbertos.length}`;

  // extrai palavras-chave relevantes da pergunta (remove stopwords)
  const stops=new Set(['quantos','quanto','qual','quais','temos','tem','ha','há','de','do','da','os','as','o','a','e','me','que','em','para','por','com','sobre','mais','menos','maior','menor','total','valor','saldo','preciso','quero','pedir','solicitar']);
  const palavras=ql.split(/\s+/).filter(w=>w.length>2&&!stops.has(w));

  // filtra produtos relevantes (trata plural: remove 's' ou 'es' do final)
  let prodsRel=[];
  if(palavras.length>0){
    const variantes=palavras.flatMap(w=>{
      const vs=[w];
      if(w.endsWith('s'))vs.push(w.slice(0,-1));   // parafusos → parafuso
      if(w.endsWith('es'))vs.push(w.slice(0,-2));  // luvas → luva (já coberto acima)
      if(w.endsWith('ões'))vs.push(w.slice(0,-3)+'ao'); // parafusões → parafusao
      return vs;
    });
    prodsRel=prods.filter(p=>
      variantes.some(w=>norm(p.nome).includes(w)||norm(p.codigo).includes(w)||norm(p.categoria).includes(w))
    );
  }
  // para pedidos: inclui todos os produtos (versão ultra-compacta: id|nome|saldo)
  const isPedido=/pedir|solicitar|requisitar|abrir pedido|fazer pedido|quero pedir|preciso de/.test(ql);
  let prodCtx='';
  if(isPedido){
    // para pedidos: usa os produtos já filtrados por keyword; se não achou nada, manda os 100 primeiros ultra-compactos
    const candidatos=prodsRel.length>0?prodsRel:prods.slice(0,100);
    const linhas=candidatos.map(p=>`id:${p.id} "${p.nome}" ${p.unidade} saldo:${fmt(p.saldo,2)}`);
    prodCtx=`\nPRODUTOS_CANDIDATOS (${candidatos.length}${prodsRel.length===0?' — primeiros 100':''}, id|nome|un|saldo):\n${linhas.join('\n')}`;
  } else if(prodsRel.length>0&&prodsRel.length<=50){
    const linhas=prodsRel.map(p=>`${p.nome} [${p.codigo}] un:${p.unidade} gaiola:${p.gaiola||'-'} saldo:${fmt(p.saldo,2)} min:${fmt(p.minimo,2)} preco:${moeda(p.preco||0)} valor:${moeda((p.preco||0)*p.saldo)} status:${p.saldo<=0?'SEM_ESTOQUE':p.saldo<p.minimo?'ABAIXO_MIN':'OK'}`);
    prodCtx=`\nPRODUTOS_RELEVANTES (${prodsRel.length}):\n${linhas.join('\n')}`;
  } else if(prodsRel.length>50){
    // muitos resultados: agrega por categoria
    const cats={};
    prodsRel.forEach(p=>{const c=p.categoria||'Sem categoria';if(!cats[c])cats[c]={n:0,saldo:0,val:0};cats[c].n++;cats[c].saldo+=p.saldo;cats[c].val+=(p.preco||0)*p.saldo;});
    prodCtx=`\nPRODUTOS_ENCONTRADOS: ${prodsRel.length} produtos matching "${palavras.join(' ')}"\nPOR_CATEGORIA:\n`+Object.entries(cats).map(([c,d])=>`${c}: ${d.n} itens, saldo_total:${fmt(d.saldo,2)}, valor:${moeda(d.val)}`).join('\n');
  } else {
    // nenhum produto específico encontrado — manda resumo por categoria
    const cats={};
    prods.forEach(p=>{const c=p.categoria||'Sem categoria';if(!cats[c])cats[c]={n:0,val:0};cats[c].n+=p.saldo;cats[c].val+=(p.preco||0)*p.saldo;});
    prodCtx=`\nRESUMO_POR_CATEGORIA:\n`+Object.entries(cats).sort((a,b)=>b[1].val-a[1].val).slice(0,20).map(([c,d])=>`${c}: ${fmt(d.n,0)} un, ${moeda(d.val)}`).join('\n');
  }

  // últimas movimentações (só se pergunta sobre histórico)
  let movCtx='';
  if(/moviment|entrada|saida|saída|histórico|historico|ultima|última/.test(ql)){
    const recentes=[...movs].sort((a,b)=>b.id-a.id).slice(0,15)
      .map(m=>`${fmtD(m.data)} ${m.tipo} ${fmt(m.qtd,2)}x ${m.produtoNome}`);
    movCtx=`\nULTIMAS_MOVIMENTACOES:\n${recentes.join('\n')}`;
  }

  return resumo+prodCtx+movCtx;
}

window.marioConfirmarPedido=async function(){
  const args=_marioArgsTemp;
  if(!args||!args.itens?.length){marioAddMsg('bot','⚠️ Nenhum item no pedido.');return;}
  // lê setor/prioridade editados
  const setorEl=document.getElementById('mario-setor-inp');
  const priorEl=document.getElementById('mario-prior-inp');
  if(setorEl)args.setor=setorEl.value.trim()||args.setor;
  if(priorEl)args.prioridade=priorEl.value||'Normal';
  if(!args.setor){alert('Informe o setor/destino do pedido.');return;}
  const btn=event?.target;
  if(btn){btn.disabled=true;btn.textContent='Criando…';}
  try{
    const prods=_marioCtx.prods.length?_marioCtx.prods:await dbGetAll('produtos');
    const num=await nextPedNum();
    const itens=args.itens.filter(it=>it.qtd>0).map(it=>{
      const p=prods.find(x=>x.id===it.produtoId)||{};
      return{produtoId:it.produtoId,produtoNome:it.produtoNome,
        unidade:p.unidade||'UN',qtd:it.qtd,qtdEntregue:0};
    });
    if(!itens.length){marioAddMsg('bot','⚠️ Todos os itens foram removidos.');if(btn){btn.disabled=false;btn.textContent='✅ Confirmar pedido';}return;}
    const pedObj={numero:num,solicitante:CU?.nome||'Mario',setor:args.setor,
      prioridade:args.prioridade||'Normal',obs:args.obs||null,
      solicitanteEmail:CU?.email||null,
      status:'Pendente',itens,criadoEm:now(),atualizadoEm:now()};
    await dbAdd('pedidos',pedObj);
    notificarEstoque(pedObj);
    notificarSolicitante(pedObj,'Pendente');
    document.getElementById('mario-confirm-card')?.remove();
    _marioArgsTemp=null;
    marioAddMsg('bot',`✅ <strong>Pedido ${num} criado!</strong><br/>Setor: <strong>${escH(args.setor)}</strong> · Prioridade: ${args.prioridade} · ${itens.length} item(ns)<br/><br/><button class="btn btn-p btn-sm" onclick="navTo('pedidos')">Ver pedidos →</button>`,true);
    marioSpeak(`Pedido ${num} criado com sucesso para ${args.setor}.`);
  }catch(e){
    marioAddMsg('bot',`❌ Erro ao criar pedido: ${e.message}`);
    if(btn){btn.disabled=false;btn.textContent='✅ Confirmar pedido';}
  }
};

window.marioSend=async function(){
  const inp=document.getElementById('mario-txt');
  const txt=(inp?.value||'').trim();
  if(!txt)return;
  inp.value='';inp.style.height='auto';
  marioAddMsg('user',txt);
  const typing=document.getElementById('mario-typing');
  if(typing)typing.style.display='flex';
  document.getElementById('mario-msgs').scrollTop=99999;

  // fecha autocomplete
  const acBox=document.getElementById('mario-autocomplete');
  if(acBox){acBox.classList.remove('open');acBox.innerHTML='';}

  // atalho navegação WMS
  const navPage=marioNavIntent(txt);
  if(navPage){
    if(typing)typing.style.display='none';
    const titles={dashboard:'Dashboard & BI',produtos:'Produtos',entrada:'Entrada de Estoque',saida:'Saída de Estoque',posicoes:'Posições / Gaiolas',inventario:'Inventário Físico',pedidos:'Pedidos',historico:'Histórico',usuarios:'Usuários',estoque_view:'Consulta de Estoque',minha_conta:'Minha Conta'};
    marioAddMsg('bot',`✅ Abrindo <strong>${titles[navPage]||navPage}</strong>…`,true);
    setTimeout(()=>{ navTo(navPage); marioWidgetToggle(); },600);
    return;
  }

  // atalho QA via chat
  if(/\bqa\b|testar sistema|teste do sistema|diagnóstico|diagnostico|auditoria do sistema|verificar sistema/.test(txt.toLowerCase())){
    return marioRunQA();
  }

  try{
    const [prods,movs,pedidos]=await Promise.all([dbGetAll('produtos'),dbGetAll('movimentos'),dbGetAll('pedidos')]);
    _marioCtx={prods,movs,pedidos};

    const groqKey=localStorage.getItem('mario_groq_key')||'';

    if(groqKey){
      const ctx=marioBuildContext(txt,prods,movs,pedidos);
      const system=`Você é Mario, assistente de estoque da MRO Serviços Logísticos.
Responda em português brasileiro. Use os dados reais do estoque abaixo.
Seja objetivo e amigável. Para listas longas limite a 15 itens.
NÃO invente dados. Se o usuário pedir para SOLICITAR, PEDIR ou REQUISITAR materiais/produtos, use a ferramenta criar_pedido.
Para identificar o produto correto, use o produtoId da lista abaixo. Caso o usuário não especifique o setor, use "Não informado".

${ctx}`;

      const body={
        model:'llama-3.1-8b-instant',
        messages:[{role:'system',content:system},{role:'user',content:txt}],
        tools:[MARIO_TOOL_CRIAR_PEDIDO],
        tool_choice:'auto',
        max_tokens:1024,
        temperature:0.2
      };

      const resp=await fetch('https://api.groq.com/openai/v1/chat/completions',{
        method:'POST',
        headers:{'Authorization':`Bearer ${groqKey}`,'Content-Type':'application/json'},
        body:JSON.stringify(body)
      });
      if(!resp.ok){
        const err=await resp.json().catch(()=>({}));
        throw new Error(err?.error?.message||`Erro ${resp.status} na API Groq`);
      }
      const data=await resp.json();
      const choice=data.choices?.[0];
      if(typing)typing.style.display='none';

      // ── a IA decidiu criar um pedido ──
      if(choice?.finish_reason==='tool_calls'||choice?.message?.tool_calls?.length){
        const toolCall=choice.message.tool_calls[0];
        const args=JSON.parse(toolCall.function.arguments||'{}');
        const norm=s=>(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
        // coerce produtoId para número e completa via busca local se vier 0, null ou string inválida
        args.itens=(args.itens||[]).map(it=>{
          it.produtoId=parseInt(it.produtoId)||0;
          it.qtd=parseFloat(it.qtd)||1;
          if(!it.produtoId){
            const busca=norm(it.produtoNome||'');
            const found=busca.length>2&&prods.find(p=>norm(p.nome).includes(busca)||norm(p.codigo||'').includes(busca));
            if(found){it.produtoId=found.id;it.produtoNome=found.nome;}
          }
          return it;
        }).filter(it=>it.produtoId&&it.qtd>0);
        if(!args.itens.length){
          marioAddMsg('bot','⚠️ Não consegui identificar os produtos. Pode informar o nome exato ou código?');
        }else{
          marioMostrarConfirmacao(args,prods);
        }
      }else{
        // ── resposta normal ──
        const answer=choice?.message?.content||'Sem resposta.';
        marioAddMsg('bot',answer);
        marioSpeak(answer);
      }

    }else{
      // ── modo local sem chave ──
      const resposta=marioResponderLocal(txt,prods,movs);
      if(typing)typing.style.display='none';
      marioAddMsg('bot',resposta,true);
      marioSpeak(resposta.replace(/<[^>]+>/g,''));
    }
  }catch(e){
    if(typing)typing.style.display='none';
    const msg=e.message?.includes('401')?'❌ Chave Groq inválida. Verifique em ⚙ Chave Groq.':
               e.message?.includes('429')?'⏳ Limite de requisições atingido. Aguarde alguns segundos.':
               `❌ Erro: ${e.message}`;
    marioAddMsg('bot',msg);
  }
};

// ══════════════════════════════════════════════════════════════════
// QA — Diagnóstico Completo do WMS
// ══════════════════════════════════════════════════════════════════
window.marioRunQA=async function(){
  marioAddMsg('user','🔍 Executar QA completo do WMS');
  const typing=document.getElementById('mario-typing');
  if(typing)typing.style.display='flex';
  document.getElementById('mario-msgs').scrollTop=99999;

  try{
    const [prods,movs,pedidos,invs,users]=await Promise.all([
      dbGetAll('produtos'),dbGetAll('movimentos'),dbGetAll('pedidos'),
      dbGetAll('inventarios'),dbGetAll('usuarios')
    ]);

    const checks=[];
    const ok =(nome,detalhe)=>checks.push({s:'ok', nome,detalhe});
    const warn=(nome,detalhe)=>checks.push({s:'warn',nome,detalhe});
    const fail=(nome,detalhe)=>checks.push({s:'fail',nome,detalhe});
    const info=(nome,detalhe)=>checks.push({s:'info',nome,detalhe});

    // ── 1. CONECTIVIDADE / DADOS BÁSICOS ─────────────────────────
    info('Banco de dados','Conexão com Supabase ativa');
    prods.length>0?ok('Produtos cadastrados',`${prods.length} produtos no sistema`)
      :fail('Produtos cadastrados','Nenhum produto cadastrado');
    users.length>0?ok('Usuários',`${users.length} usuário(s) ativo(s)`)
      :fail('Usuários','Nenhum usuário encontrado');

    // ── 2. INTEGRIDADE DE PRODUTOS ────────────────────────────────
    const semCodigo=prods.filter(p=>!p.codigo?.trim());
    semCodigo.length?fail('Produtos sem código',`${semCodigo.length} produto(s): ${semCodigo.slice(0,3).map(p=>p.nome).join(', ')}`)
      :ok('Códigos de produto','Todos os produtos têm código');

    const semNome=prods.filter(p=>!p.nome?.trim());
    semNome.length?fail('Produtos sem nome',`${semNome.length} produto(s)`)
      :ok('Nomes de produto','Todos os produtos têm nome');

    const codigos=prods.map(p=>p.codigo);
    const dupCodigos=codigos.filter((c,i)=>codigos.indexOf(c)!==i);
    dupCodigos.length?fail('Códigos duplicados',`Duplicados: ${[...new Set(dupCodigos)].join(', ')}`)
      :ok('Unicidade de códigos','Nenhum código duplicado');

    const saldoNeg=prods.filter(p=>p.saldo<0);
    saldoNeg.length?fail('Saldo negativo',`${saldoNeg.length} produto(s) com saldo negativo: ${saldoNeg.map(p=>p.nome).join(', ')}`)
      :ok('Saldos de estoque','Nenhum saldo negativo');

    const semUnidade=prods.filter(p=>!p.unidade);
    semUnidade.length?warn('Produtos sem unidade',`${semUnidade.length} produto(s) sem unidade de medida`)
      :ok('Unidades de medida','Todos os produtos têm unidade');

    const semGaiola=prods.filter(p=>!p.gaiola);
    semGaiola.length>0?warn('Produtos sem posição',`${semGaiola.length} produto(s) sem gaiola definida`)
      :ok('Posicionamento','Todos os produtos têm gaiola');

    const semMinimo=prods.filter(p=>!p.minimo||p.minimo===0);
    semMinimo.length>0?warn('Estoque mínimo não definido',`${semMinimo.length} produto(s) sem estoque mínimo`)
      :ok('Estoque mínimo','Todos os produtos têm mínimo definido');

    const semPreco=prods.filter(p=>!p.preco||p.preco===0);
    semPreco.length>0?warn('Produtos sem preço',`${semPreco.length} produto(s) sem preço unitário — valor do estoque incorreto`)
      :ok('Preços','Todos os produtos têm preço cadastrado');

    // ── 3. ALERTAS DE NÍVEL DE ESTOQUE ───────────────────────────
    const abaixoMin=prods.filter(p=>p.saldo<p.minimo&&p.minimo>0);
    abaixoMin.length>0?warn('Abaixo do mínimo',`${abaixoMin.length} produto(s) abaixo do estoque mínimo — reposição necessária`)
      :ok('Níveis de estoque','Todos os produtos acima do mínimo');

    const semEstoque=prods.filter(p=>p.saldo<=0);
    semEstoque.length>0?fail('Produtos zerados',`${semEstoque.length} produto(s) com saldo zero ou negativo`)
      :ok('Disponibilidade','Nenhum produto zerado');

    // ── 4. INTEGRIDADE DE MOVIMENTOS ─────────────────────────────
    const movSemProd=movs.filter(m=>!m.produtoId);
    movSemProd.length?fail('Movimentos órfãos',`${movSemProd.length} movimento(s) sem produto vinculado`)
      :ok('Vínculo de movimentos','Todos os movimentos têm produto');

    const movSemQtd=movs.filter(m=>!m.qtd||m.qtd<=0);
    movSemQtd.length?fail('Movimentos sem quantidade',`${movSemQtd.length} movimento(s) com quantidade inválida`)
      :ok('Quantidades de movimentos','Todas as quantidades são válidas');

    // valida saldo calculado vs saldo registrado
    const saldoCalc={};
    prods.forEach(p=>{ saldoCalc[p.id]=0; });
    // pega saldo inicial (inventários) ou usa saldo atual como base
    // verifica apenas consistência de sinal (entradas +, saídas -)
    const movInvalidos=movs.filter(m=>m.tipo!=='ENTRADA'&&m.tipo!=='SAÍDA');
    movInvalidos.length?warn('Tipos de movimento inválidos',`${movInvalidos.length} movimento(s) com tipo desconhecido`)
      :ok('Tipos de movimento','Todos os movimentos são ENTRADA ou SAÍDA');

    // ── 5. PEDIDOS ────────────────────────────────────────────────
    const pedSemItens=pedidos.filter(p=>!p.itens?.length);
    pedSemItens.length?fail('Pedidos sem itens',`${pedSemItens.length} pedido(s) sem nenhum item`)
      :ok('Itens de pedidos','Todos os pedidos têm itens');

    const pedSemSetor=pedidos.filter(p=>!p.setor?.trim());
    pedSemSetor.length?warn('Pedidos sem setor',`${pedSemSetor.length} pedido(s) sem setor/destino definido`)
      :ok('Setor dos pedidos','Todos os pedidos têm setor');

    const pendentes=pedidos.filter(p=>p.status==='Pendente');
    const emSep=pedidos.filter(p=>p.status==='Em Separação');
    pendentes.length>5?warn('Pedidos pendentes acumulados',`${pendentes.length} pedidos pendentes aguardando separação`)
      :info('Pedidos pendentes',`${pendentes.length} pedido(s) aguardando separação`);
    info('Pedidos em separação',`${emSep.length} pedido(s) em andamento`);

    // verifica itens com qtdEntregue > qtd
    const pedComErroQtd=pedidos.filter(p=>(p.itens||[]).some(it=>(it.qtdEntregue||0)>(it.qtd||0)));
    pedComErroQtd.length?fail('Entrega acima do solicitado',`${pedComErroQtd.length} pedido(s) com qtd entregue maior que solicitada`)
      :ok('Consistência de entregas','Quantidades entregues são consistentes');

    // ── 6. USUÁRIOS ───────────────────────────────────────────────
    const admins=users.filter(u=>u.perfil==='admin');
    admins.length===0?fail('Sem administrador','Nenhum usuário admin encontrado')
      :admins.length===1?ok('Administrador','1 administrador no sistema')
      :warn('Múltiplos admins',`${admins.length} usuários com perfil admin`);

    const semSenha=users.filter(u=>!u.senha);
    semSenha.length?fail('Usuários sem senha',`${semSenha.length} usuário(s) sem senha cadastrada`)
      :ok('Senhas de usuários','Todos os usuários têm senha');

    // ── 7. INVENTÁRIO ─────────────────────────────────────────────
    const diasSemInv=invs.length>0?(Date.now()-new Date(invs.sort((a,b)=>b.id-a.id)[0].data).getTime())/(1000*60*60*24):9999;
    diasSemInv>30?warn('Inventário desatualizado',`Último inventário há ${Math.round(diasSemInv)} dia(s). Recomendado a cada 30 dias.`)
      :ok('Inventário recente',`Último inventário há ${Math.round(diasSemInv)} dia(s)`);

    const diverg=invs.filter(i=>Math.abs(i.divergencia)>0);
    diverg.length>0?warn('Divergências de inventário',`${diverg.length} contagem(ns) com divergência. Verifique causas.`)
      :ok('Sem divergências','Todas as contagens sem divergência');

    // ── 8. PERFORMANCE / VOLUME ───────────────────────────────────
    info('Volume de dados',`${movs.length} movimentos | ${pedidos.length} pedidos | ${invs.length} inventários`);
    const movMes=movs.filter(m=>new Date(m.data)>new Date(Date.now()-30*24*3600*1000));
    info('Movimentos (30 dias)',`${movMes.length} movimentações no último mês`);

    // ── PONTUAÇÃO ─────────────────────────────────────────────────
    const total=checks.filter(c=>c.s!=='info').length;
    const nOk=checks.filter(c=>c.s==='ok').length;
    const nWarn=checks.filter(c=>c.s==='warn').length;
    const nFail=checks.filter(c=>c.s==='fail').length;
    const score=Math.round((nOk/total)*100);

    // ── RENDER DO RELATÓRIO ───────────────────────────────────────
    const icon={ok:'✅',warn:'⚠️',fail:'❌',info:'ℹ️'};
    const cor={ok:'#166534',warn:'#92400e',fail:'#991b1b',info:'#1e3a5f'};
    const bg={ok:'#f0fdf4',warn:'#fffbeb',fail:'#fef2f2',info:'#f0f7ff'};
    const bord={ok:'#86efac',warn:'#fcd34d',fail:'#fca5a5',info:'#bfdbfe'};

    const scoreCor=score>=90?'#166534':score>=70?'#92400e':'#991b1b';
    const scoreBg=score>=90?'#f0fdf4':score>=70?'#fffbeb':'#fef2f2';

    const linhas=checks.map(c=>`<div style="display:flex;gap:8px;padding:6px 10px;border-radius:7px;background:${bg[c.s]};border:1px solid ${bord[c.s]};margin-bottom:5px;align-items:flex-start">
      <span style="font-size:.9rem;flex-shrink:0;margin-top:1px">${icon[c.s]}</span>
      <div>
        <div style="font-weight:600;font-size:.8rem;color:${cor[c.s]}">${escH(c.nome)}</div>
        <div style="font-size:.75rem;color:#555;margin-top:1px">${escH(c.detalhe)}</div>
      </div>
    </div>`).join('');

    const html=`<div style="background:#fff;border:2px solid #e0e8ff;border-radius:14px;padding:0;overflow:hidden;margin-top:4px">
      <div style="background:linear-gradient(135deg,#1a1a2e,#0f3460);padding:16px 18px;color:#fff">
        <div style="font-weight:700;font-size:1rem;margin-bottom:4px">🔍 Relatório QA — WMS MRO Serviços Logísticos</div>
        <div style="font-size:.75rem;color:#a0c4ff">${new Date().toLocaleString('pt-BR')} · ${checks.length} verificações</div>
      </div>
      <div style="padding:14px 16px 6px;display:flex;gap:12px;flex-wrap:wrap;border-bottom:1px solid #f0f0f0;margin-bottom:12px">
        <div style="text-align:center;padding:10px 18px;background:${scoreBg};border-radius:10px;border:2px solid ${scoreCor}">
          <div style="font-size:1.6rem;font-weight:900;color:${scoreCor}">${score}%</div>
          <div style="font-size:.7rem;color:${scoreCor};font-weight:600">SCORE</div>
        </div>
        <div style="display:flex;flex-direction:column;justify-content:center;gap:4px">
          <div style="font-size:.8rem">✅ <strong>${nOk}</strong> OK &nbsp; ⚠️ <strong>${nWarn}</strong> Alertas &nbsp; ❌ <strong>${nFail}</strong> Falhas</div>
          <div style="font-size:.75rem;color:var(--lt)">${nFail===0&&nWarn===0?'Sistema em ótimas condições!':nFail===0?'Atenção a alguns pontos.':'Corrija as falhas encontradas.'}</div>
        </div>
      </div>
      <div style="padding:0 16px 14px">${linhas}</div>
      ${localStorage.getItem('mario_groq_key')?`<div style="padding:0 16px 14px"><button class="btn btn-p btn-sm" onclick="marioQAAnaliseIA(${score},${nFail},${nWarn})">🤖 Analisar com IA e receber recomendações</button></div>`:''}
    </div>`;

    if(typing)typing.style.display='none';
    marioAddMsg('bot',html,true);
    marioSpeak(`QA concluído. Score ${score} por cento. ${nFail} falha${nFail!==1?'s':''} e ${nWarn} alerta${nWarn!==1?'s':''} encontrado${nWarn!==1?'s':''}.`);

    // guarda resumo para análise IA
    window._marioQAResumo={score,nOk,nWarn,nFail,checks,prods,pedidos,movs,invs,users};

  }catch(e){
    if(typing)typing.style.display='none';
    marioAddMsg('bot',`❌ Erro ao executar QA: ${e.message}`);
  }
};

window.marioQAAnaliseIA=async function(score,nFail,nWarn){
  const btn=event?.target;
  if(btn){btn.disabled=true;btn.textContent='Analisando…';}
  const groqKey=localStorage.getItem('mario_groq_key')||'';
  if(!groqKey){marioAddMsg('bot','Configure a chave Groq para análise IA.');return;}

  const checks=(r.checks||[]).filter(c=>c.s!=='info');
  const falhas=checks.filter(c=>c.s==='fail').map(c=>`FALHA: ${c.nome} — ${c.detalhe}`).join('\n');
  const alertas=checks.filter(c=>c.s==='warn').map(c=>`ALERTA: ${c.nome} — ${c.detalhe}`).join('\n');
  const resumo=`Sistema WMS MRO Serviços Logísticos
Score QA: ${score}% (${r.nOk} OK, ${r.nWarn} alertas, ${r.nFail} falhas)
Produtos: ${r.prods?.length||0} | Movimentos: ${r.movs?.length||0} | Pedidos: ${r.pedidos?.length||0}
${falhas?'FALHAS:\n'+falhas:'Sem falhas críticas.'}
${alertas?'\nALERTAS:\n'+alertas:'Sem alertas.'}`;

  const typing=document.getElementById('mario-typing');
  if(typing)typing.style.display='flex';
  try{
    const resp=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Authorization':`Bearer ${groqKey}`,'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'llama-3.1-8b-instant',
        messages:[
          {role:'system',content:'Você é um especialista em WMS (Warehouse Management System). Analise o relatório de QA e forneça: 1) Diagnóstico dos problemas encontrados 2) Prioridade de correção (Alta/Média/Baixa) 3) Ações específicas para cada problema 4) Boas práticas recomendadas para o sistema. Responda em português, de forma estruturada e prática.'},
          {role:'user',content:`Analise este relatório de QA do nosso WMS:\n\n${resumo}`}
        ],
        max_tokens:1024,
        temperature:0.3
      })
    });
    const data=await resp.json();
    const answer=data.choices?.[0]?.message?.content||'Sem resposta.';
    if(typing)typing.style.display='none';
    marioAddMsg('bot',answer);
    marioSpeak('Análise IA concluída.');
  }catch(e){
    if(typing)typing.style.display='none';
    marioAddMsg('bot',`❌ Erro na análise IA: ${e.message}`);
  }
  if(btn){btn.disabled=false;btn.textContent='🤖 Analisar com IA';}
};

// ── motor local de fallback (sem chave) ─────────────────────────
function marioResponderLocal(q,prods,movs){
  const ql=q.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
  const norm=s=>(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
  const moeda=v=>`R$ ${fmt(v,2)}`;

  if(/valor total|estoque total|quanto vale|patrimonio/.test(ql)){
    const t=prods.reduce((s,p)=>s+(p.preco||0)*p.saldo,0);
    return`💰 Valor total do estoque: <strong>${moeda(t)}</strong><br/>📦 ${prods.length} produtos · ${fmt(prods.reduce((s,p)=>s+p.saldo,0),0)} unidades`;
  }
  if(/abaixo|minimo|critico|repor/.test(ql)){
    const l=prods.filter(p=>p.saldo<p.minimo&&p.minimo>0).sort((a,b)=>a.saldo/a.minimo-b.saldo/b.minimo);
    if(!l.length)return'✅ Nenhum produto abaixo do mínimo!';
    return`⚠️ <strong>${l.length} produto(s) abaixo do mínimo:</strong><br/><br/>`+l.slice(0,15).map(p=>`• <strong>${escH(p.nome)}</strong> — ${fmt(p.saldo,2)}/${fmt(p.minimo,2)} ${p.unidade}`).join('<br/>');
  }
  if(/sem estoque|saldo zero|zerado|esgotado/.test(ql)){
    const l=prods.filter(p=>p.saldo<=0);
    if(!l.length)return'✅ Nenhum produto sem estoque!';
    return`🔴 <strong>${l.length} produto(s) sem estoque:</strong><br/>`+l.slice(0,20).map(p=>`• ${escH(p.nome)}`).join('<br/>');
  }
  if(/top|mais valioso|maior valor|mais caro/.test(ql)){
    const n=+((/\d+/.exec(ql)||['5'])[0]);
    const l=[...prods].sort((a,b)=>((b.preco||0)*b.saldo)-((a.preco||0)*a.saldo)).slice(0,n);
    return`💰 <strong>Top ${n} por valor:</strong><br/>`+l.map((p,i)=>`${i+1}. ${escH(p.nome)} — ${moeda((p.preco||0)*p.saldo)}`).join('<br/>');
  }
  if(/categoria/.test(ql)){
    const c={};prods.forEach(p=>{const k=p.categoria||'Sem categoria';if(!c[k])c[k]={n:0,v:0};c[k].n+=p.saldo;c[k].v+=(p.preco||0)*p.saldo;});
    return`📊 <strong>Por categoria:</strong><br/>`+Object.entries(c).sort((a,b)=>b[1].v-a[1].v).map(([k,d])=>`• ${escH(k)}: ${fmt(d.n,0)} un — ${moeda(d.v)}`).join('<br/>');
  }
  // busca por nome/código — extrai palavra-chave da pergunta
  const stopWords=/^(temos|quantos|quanto|qual|quais|o|a|os|as|de|do|da|dos|das|em|que|e|me|tem|ha|há|é|esta|este|esse|essa)\s*/;
  let busca=ql.replace(stopWords,'').replace(/\?/g,'').trim();
  // remove palavras genéricas de pergunta
  busca=busca.replace(/\b(quantos|saldo|preco|custo|temos|produto|estoque)\b/g,'').trim();
  if(busca.length>=3){
    const encontrados=prods.filter(p=>norm(p.nome).includes(busca)||norm(p.codigo).includes(busca)||norm(p.categoria).includes(busca));
    if(encontrados.length){
      const totalSaldo=encontrados.reduce((s,p)=>s+p.saldo,0);
      const totalVal=encontrados.reduce((s,p)=>s+(p.preco||0)*p.saldo,0);
      if(encontrados.length===1){
        const p=encontrados[0];
        return`📦 <strong>${escH(p.nome)}</strong><br/>Código: ${escH(p.codigo)} | Gaiola: ${p.gaiola||'—'}<br/>Saldo: <strong>${fmt(p.saldo,2)} ${p.unidade}</strong> | Mín: ${fmt(p.minimo,2)}<br/>Preço: ${moeda(p.preco||0)} | Valor: ${moeda((p.preco||0)*p.saldo)}<br/>Status: ${p.saldo<=0?'🔴 Sem estoque':p.saldo<p.minimo?'🟡 Abaixo do mínimo':'🟢 Disponível'}`;
      }
      return`📦 <strong>${encontrados.length} produto(s) encontrado(s) para "${escH(busca)}":</strong><br/>Total: <strong>${fmt(totalSaldo,2)} unidades</strong> | ${moeda(totalVal)}<br/><br/>`+encontrados.slice(0,15).map(p=>`• ${escH(p.nome)} — ${fmt(p.saldo,2)} ${p.unidade}`).join('<br/>');
    }
  }
  return`🤔 Não encontrei essa informação no modo básico.<br/><br/>💡 <strong>Configure a chave Groq gratuita</strong> (⚙ Chave Groq) para perguntas mais complexas como "temos quantos parafusos?" — a IA entenderá qualquer pergunta!`;
}

window.marioToggleMic=function(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const btn=document.getElementById('mario-mic');
  const inp=document.getElementById('mario-txt');

  if(!SR){
    marioAddMsg('bot','⚠️ Microfone só funciona no <strong>Google Chrome</strong> (desktop ou Android). Abra o app no Chrome.',true);
    return;
  }

  // se já está ouvindo → para
  if(_marioListening){
    try{_marioRecog?.stop();}catch(e){}
    _marioListening=false;
    if(btn){btn.classList.remove('listening');btn.textContent='🎤';}
    if(inp)inp.placeholder='Pergunte sobre o estoque… (Enter para enviar)';
    return;
  }

  const _micReset=()=>{
    _marioListening=false;
    if(btn){btn.classList.remove('listening','asking');btn.textContent='🎤';}
    if(inp)inp.placeholder='Pergunte sobre o estoque… (Enter para enviar)';
    if(_micTimeout)clearTimeout(_micTimeout);
  };

  // timeout de segurança: reseta se não iniciar em 8s
  let _micTimeout=setTimeout(()=>{
    if(_marioListening)return;
    _micReset();
  },8000);

  if(btn){btn.classList.add('listening');btn.textContent='🔴';}
  if(inp){inp.placeholder='🎤 Ouvindo… fale agora';inp.value='';}

  if(_marioRecog){try{_marioRecog.abort();}catch(e){}_marioRecog=null;}
  _marioRecog=new SR();
  _marioRecog.lang='pt-BR';
  _marioRecog.interimResults=true;
  _marioRecog.continuous=false;
  _marioRecog.maxAlternatives=1;

  _marioRecog.onstart=()=>{
    _marioListening=true;
    clearTimeout(_micTimeout);
  };

  _marioRecog.onresult=(e)=>{
    let interim='',final='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      const t=e.results[i][0].transcript;
      if(e.results[i].isFinal)final+=t; else interim+=t;
    }
    if(inp){
      inp.value=final||interim;
      inp.style.height='auto';
      inp.style.height=Math.min(inp.scrollHeight,90)+'px';
      marioAutocomp(inp.value);
    }
  };

  _marioRecog.onend=()=>{
    _micReset();
    const txt=(inp?.value||'').trim();
    if(txt)setTimeout(()=>marioSend(),400);
  };

  _marioRecog.onerror=(e)=>{
    _micReset();
    const msgs={
      'not-allowed':`🔒 <strong>Microfone bloqueado.</strong><br/><br/>No Chrome:<br/>1. Clique no ícone 🔒 à esquerda da URL<br/>2. Microfone → <strong>Permitir</strong><br/>3. Recarregue a página (F5)<br/><br/>No celular: Configurações → Chrome → Microfone → Permitir`,
      'no-speech':'🔇 Nenhuma fala detectada. Tente falar mais alto.',
      'audio-capture':'🎤 Microfone não encontrado ou em uso por outro app.',
      'network':'🌐 Sem internet. O reconhecimento de voz precisa de conexão.',
      'service-not-allowed':'🔒 Microfone bloqueado pelo navegador. Verifique as permissões.',
    };
    if(e.error!=='aborted')marioAddMsg('bot',msgs[e.error]||`⚠️ Erro no microfone: <code>${e.error}</code>`,true);
  };

  try{
    _marioRecog.start();
  }catch(err){
    _micReset();
    marioAddMsg('bot','⚠️ Não foi possível iniciar o microfone. Verifique as permissões no Chrome.',true);
  }
};

PAGES.lista_pedido=async(el)=>{
  el.innerHTML='<div class="tlt">Carregando dados…</div>';
  const [peds,prods]=await Promise.all([dbGetAll('pedidos'),dbGetAll('produtos')]);
  const prodMap={};prods.forEach(p=>{prodMap[p.id]=p;});

  // consumo médio mensal (últimos 6 meses)
  const seisM=new Date();seisM.setMonth(seisM.getMonth()-6);
  const consumoMap={};
  peds.filter(p=>p.status==='Entregue'&&new Date(p.criadoEm)>seisM).forEach(p=>{
    (p.itens||[]).forEach(it=>{
      if(!consumoMap[it.produtoId])consumoMap[it.produtoId]={nome:it.produtoNome,un:it.unidade||'UN',total:0};
      consumoMap[it.produtoId].total+=+(it.qtdEntregue||it.qtd||0);
    });
  });

  // itens não atendidos (solicitados mas não entregues)
  const naoAtMap={};
  peds.forEach(p=>{
    (p.itens||[]).forEach(it=>{
      const falta=(it.qtd||0)-(it.qtdEntregue||0);
      if(falta>0){
        if(!naoAtMap[it.produtoId])naoAtMap[it.produtoId]={nome:it.produtoNome,un:it.unidade||'UN',total:0};
        naoAtMap[it.produtoId].total+=falta;
      }
    });
  });

  // produtos abaixo do mínimo
  const abaixoMin=prods.filter(p=>(p.saldo||0)<(p.estoque_minimo||0));

  // união de todos os produtos relevantes
  const ids=new Set([...Object.keys(consumoMap),...Object.keys(naoAtMap),...abaixoMin.map(p=>String(p.id))]);
  let _lista=JSON.parse(localStorage.getItem('lista_pedido_data')||'[]');
  if(!_lista.length){
    _lista=[...ids].map(id=>{
      const p=prodMap[+id];
      const c=consumoMap[id];
      const n=naoAtMap[id];
      const mediaM=c?Math.round(c.total/6):0;
      const naoAt=n?Math.round(n.total):0;
      const saldo=p?Math.round(p.saldo||0):0;
      const minimo=p?Math.round(p.estoque_minimo||0):0;
      return{id:+id,nome:p?.nome||c?.nome||n?.nome||'?',un:p?.unidade||c?.un||n?.un||'UN',saldo,minimo,mediaM,naoAt,qtd:Math.max(mediaM,naoAt,0),obs:''};
    }).sort((a,b)=>b.naoAt-a.naoAt||b.mediaM-a.mediaM);
  }
  window._lpLista=_lista;

  function renderTabela(){
    return`<div class="tbl-wrap"><table id="lp-tbl">
      <thead><tr>
        <th onclick="sortTbl('lp-tbl',0)" style="cursor:pointer">Produto ⇅</th>
        <th>Un.</th>
        <th onclick="sortTbl('lp-tbl',2,'num')" style="cursor:pointer">Saldo ⇅</th>
        <th onclick="sortTbl('lp-tbl',3,'num')" style="cursor:pointer">Mínimo ⇅</th>
        <th onclick="sortTbl('lp-tbl',4,'num')" style="cursor:pointer">Consumo/Mês ⇅</th>
        <th onclick="sortTbl('lp-tbl',5,'num')" style="cursor:pointer">Não Atendido ⇅</th>
        <th>Qtd a Pedir</th>
        <th>Observação</th>
        <th></th>
      </tr></thead>
      <tbody>${_lpLista.map((it,i)=>{
        const alerta=it.saldo<it.minimo?'style="color:var(--red);font-weight:700"':'';
        return`<tr>
          <td>${escH(it.nome)}</td>
          <td>${escH(it.un)}</td>
          <td ${alerta}>${it.saldo}</td>
          <td>${it.minimo}</td>
          <td>${it.mediaM}</td>
          <td style="${it.naoAt>0?'color:var(--warning);font-weight:700':''}"">${it.naoAt}</td>
          <td><input type="number" min="0" step="1" value="${it.qtd}" oninput="window._lpLista[${i}].qtd=Math.round(+this.value||0);this.value=window._lpLista[${i}].qtd" style="width:80px;text-align:center"/></td>
          <td><input type="text" value="${escH(it.obs||'')}" oninput="window._lpLista[${i}].obs=this.value" style="width:140px"/></td>
          <td><button class="btn btn-r btn-sm" onclick="lpRemItem(${i})">×</button></td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>`;
  }

  const groqKey=localStorage.getItem('mario_groq_key')||'';
  el.innerHTML=`
    <div class="row" style="margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <div class="tlt">Lista gerada com base nos últimos 6 meses de consumo e itens não atendidos.</div>
      <div class="row mla" style="gap:8px;flex-wrap:wrap">
        ${groqKey?`<button class="btn btn-p" onclick="lpGerarIA()">🤖 Gerar com IA</button>`:'<span class="tlt" style="font-size:.75rem">Configure a chave Groq no Mario para usar IA</span>'}
        <button class="btn btn-o" onclick="lpSalvar()">💾 Salvar Rascunho</button>
        <button class="btn btn-o" onclick="lpExportar()">📥 Exportar CSV</button>
        <button class="btn btn-r btn-sm" onclick="lpLimpar()" title="Limpar lista e recalcular">↺ Resetar</button>
      </div>
    </div>
    <div id="lp-ia-status" style="display:none" class="alert al-w">Gerando sugestões com IA…</div>
    <div class="card">${renderTabela()}</div>`;

  window.lpRemItem=(i)=>{window._lpLista.splice(i,1);document.querySelector('.card').innerHTML=renderTabela();};
  window.lpSalvar=()=>{localStorage.setItem('lista_pedido_data',JSON.stringify(window._lpLista));alert('✓ Rascunho salvo!');};
  window.lpLimpar=()=>{if(!confirm('Limpar lista e recalcular?'))return;localStorage.removeItem('lista_pedido_data');navTo('lista_pedido');};
  window.lpExportar=()=>{
    const h='Produto,Unidade,Saldo,Mínimo,Consumo/Mês,Não Atendido,Qtd a Pedir,Observação';
    const rows=window._lpLista.map(it=>[`"${it.nome}"`,it.un,it.saldo,it.minimo,it.mediaM,it.naoAt,it.qtd,`"${it.obs||''}"`].join(','));
    const blob=new Blob([h+'\n'+rows.join('\n')],{type:'text/csv;charset=utf-8'});
    Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:'lista_pedido_mensal.csv'}).click();
  };
  window.lpGerarIA=async()=>{
    const key=localStorage.getItem('mario_groq_key')||'';
    if(!key){alert('Configure a chave Groq no Mario IA.');return;}
    const st=document.getElementById('lp-ia-status');
    st.style.display='';
    const resumo=window._lpLista.slice(0,40).map(it=>`${it.nome}: saldo=${it.saldo}, mín=${it.minimo}, consumo/mês=${it.mediaM}, não atendido=${it.naoAt}, qtdAtual=${it.qtd}`).join('\n');
    try{
      const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{
        method:'POST',
        headers:{'Authorization':'Bearer '+key,'Content-Type':'application/json'},
        body:JSON.stringify({model:'llama3-8b-8192',temperature:0.3,max_tokens:1200,messages:[
          {role:'system',content:'Você é especialista em suprimentos MRO. Analise a lista e sugira quantidades a pedir (inteiros). Responda APENAS em JSON array com campos: nome, qtd (inteiro), motivo (máx 60 chars). Ordene por prioridade.'},
          {role:'user',content:`Lista de produtos para revisar:\n${resumo}\n\nRetorne JSON array com sugestões de qtd a pedir para os mais prioritários.`}
        ]})
      });
      const d=await r.json();
      const txt=d.choices?.[0]?.message?.content||'';
      const match=txt.match(/\[[\s\S]*\]/);
      if(match){
        const sugs=JSON.parse(match[0]);
        sugs.forEach(s=>{
          const item=window._lpLista.find(it=>it.nome.toLowerCase().includes(s.nome?.toLowerCase()?.slice(0,10)));
          if(item){item.qtd=Math.round(Math.abs(+s.qtd)||item.qtd);if(s.motivo)item.obs=s.motivo;}
        });
        document.querySelector('.card').innerHTML=renderTabela();
        st.textContent='✓ IA aplicou sugestões às quantidades.';st.className='alert al-s';
      }else{st.textContent='IA não retornou sugestões estruturadas.';st.className='alert al-d';}
    }catch(e){st.textContent='Erro: '+e.message;st.className='alert al-d';}
  };
};

window.alterarSenha=async()=>{
  const atual=(document.getElementById('mcSenhaAtual')?.value||'');
  const nova=(document.getElementById('mcNovaSenha')?.value||'');
  const conf=(document.getElementById('mcConfSenha')?.value||'');

window._tblSort={};
window.sortTbl=function(tblId,col,type){
  const tbl=document.getElementById(tblId);
  if(!tbl)return;
  const tbody=tbl.querySelector('tbody');
  if(!tbody)return;
  const rows=Array.from(tbody.querySelectorAll('tr')).filter(r=>r.cells.length>1);
  const key=tblId+'_'+col;
  const asc=window._tblSort[key]!=='asc';
  window._tblSort[key]=asc?'asc':'desc';
  // update header icons
  tbl.querySelectorAll('thead th').forEach((th,i)=>{
    const ico=th.querySelector('.sico');
    if(ico)ico.textContent=i===col?(asc?'↑':'↓'):'⇅';
  });
  rows.sort((a,b)=>{
    const av=(a.cells[col]?.textContent||'').trim();
    const bv=(b.cells[col]?.textContent||'').trim();
    if(type==='num'){
      const an=parseFloat(av.replace(/[^\d.,-]/g,'').replace(',','.'))||0;
      const bn=parseFloat(bv.replace(/[^\d.,-]/g,'').replace(',','.'))||0;
      return asc?an-bn:bn-an;
    }
    if(type==='date'){
      const ad=av.includes('/')?av.split('/').reverse().join('-'):av;
      const bd=bv.includes('/')?bv.split('/').reverse().join('-'):bv;
      return asc?ad.localeCompare(bd):bd.localeCompare(ad);
    }
    return asc?av.localeCompare(bv,'pt-BR',{numeric:true}):bv.localeCompare(av,'pt-BR',{numeric:true});
  });
  rows.forEach(r=>tbody.appendChild(r));
};

let _prodSortCol='nome',_prodSortAsc=true;
window.sortProd=(col)=>{
  if(_prodSortCol===col){_prodSortAsc=!_prodSortAsc;}else{_prodSortCol=col;_prodSortAsc=col==='saldo'||col==='minimo'?false:true;}
  const tbody=document.querySelector('#tP tbody');
  if(!tbody)return;
  const rows=Array.from(tbody.querySelectorAll('tr[data-q]'));
  rows.sort((a,b)=>{
    const pa=a.dataset,pb=b.dataset;
    let va,vb;
    if(col==='saldo'||col==='minimo'||col==='preco'){
      const idx=col==='saldo'?8:col==='minimo'?10:7;
      va=parseFloat(a.cells[idx]?.textContent?.replace(/[^\d.,-]/g,'').replace(',','.')||0)||0;
      vb=parseFloat(b.cells[idx]?.textContent?.replace(/[^\d.,-]/g,'').replace(',','.')||0)||0;
      return _prodSortAsc?va-vb:vb-va;
    }else{
      const idx=col==='codigo'?2:col==='nome'?3:3;
      va=a.cells[idx]?.textContent||'';
      vb=b.cells[idx]?.textContent||'';
      return _prodSortAsc?va.localeCompare(vb):vb.localeCompare(va);
    }
  });
  rows.forEach(r=>tbody.appendChild(r));
};

  mOpen(p?'Editar Produto':'Novo Produto',`
    <div class="fg">
      <div class="fgp"><label>Código*</label><input id="fC" value="${escH(p?.codigo||autoCode)}"/></div>
      <div class="fgp"><label>EAN / Cód. Barras</label><input id="fE" value="${escH(p?.ean||'')}"/></div>
      <div class="fgp"><label>Nome*</label><input id="fN" value="${escH(p?.nome||'')}"/></div>
      <div class="fgp"><label>Fornecedor</label><input id="fForn" value="${escH(p?.fornecedor||'')}"/></div>
      <div class="fgp"><label>Unidade</label><select id="fU">${['UN','KG','L','M','CX','PC'].map(u=>`<option${p?.unidade===u?' selected':''}>${u}</option>`).join('')}</select></div>
      <div class="fgp"><label>Categoria</label><input id="fK" value="${escH(p?.categoria||'')}"/></div>
      <div class="fgp"><label>Posição (Gaiola)</label><select id="fG"><option value="">Sem posição</option>${gOpts}</select></div>
      <div class="fgp"><label>Preço Unitário (R$)</label><input id="fP" type="number" min="0" step="0.01" value="${p?.preco||0}"/></div>
      <div class="fgp"><label>Estoque Mínimo</label><input id="fM" type="number" min="0" value="${p?.minimo||0}"/></div>
      <div class="fgp"><label>Lead Time Reposição (dias)</label><input id="fLT" type="number" min="0" value="${p?.leadTime||0}"/></div>
      ${!p?`<div class="fgp"><label>Saldo Inicial</label><input id="fS" type="number" min="0" value="0"/></div>`:''}
      <div class="fgp full">
        <label>Foto do Produto</label>
        ${p?.foto?`<img id="fotoPreview" src="${p.foto}" style="max-height:80px;border-radius:6px;margin-bottom:6px;display:block"/>`:
          `<img id="fotoPreview" style="max-height:80px;border-radius:6px;margin-bottom:6px;display:none"/>`}
        <input type="file" id="fFoto" accept="image/*" onchange="prevFoto(this)" style="font-size:.8rem"/>
        ${p?.foto?`<button class="btn btn-r btn-sm" style="margin-top:4px" onclick="remFoto()">Remover foto</button>`:''}
      </div>
    </div>`,
    `<button class="btn btn-o" onclick="mClose()">Cancelar</button>
     <button class="btn btn-p" onclick="salvarProd(${p?p.id:''})">Salvar</button>`);
}
window.prevFoto=function(inp){
  const file=inp.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    const img=new Image();
    img.onload=function(){
      const canvas=document.createElement('canvas');
      const MAX=400;
      let w=img.width,h=img.height;
      if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
      if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const b64=canvas.toDataURL('image/jpeg',0.75);
      const prev=document.getElementById('fotoPreview');
      if(prev){prev.src=b64;prev.style.display='block';}
      window._fotoB64=b64;
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
};
window.remFoto=function(){
  window._fotoB64='__remove__';
  const prev=document.getElementById('fotoPreview');
  if(prev){prev.src='';prev.style.display='none';}
};
window.salvarProd=async(id)=>{
  // lê todos os valores do form ANTES de qualquer await
  const numId   = id ? +id : null;
  const codigo   = (document.getElementById('fC')?.value||'').trim();
  const ean      = (document.getElementById('fE')?.value||'').trim()||null;
  const nome     = (document.getElementById('fN')?.value||'').trim();
  const fornecedor=(document.getElementById('fForn')?.value||'').trim()||null;
  const unidade  = document.getElementById('fU')?.value||'UN';
  const categoria= (document.getElementById('fK')?.value||'').trim()||null;
  const gaiola   = document.getElementById('fG')?.value||null;
  const preco    = +(document.getElementById('fP')?.value||0);
  const minimo   = +(document.getElementById('fM')?.value||0);
  const leadTime = +(document.getElementById('fLT')?.value||0);
  const saldoIni = +(document.getElementById('fS')?.value||0);
  const fotoNova = window._fotoB64||null;
  window._fotoB64=null;
  if(!codigo||!nome){showMErr('Código e nome são obrigatórios.');return;}
  const btn=document.querySelector('#mFoot .btn-p');
  if(btn){btn.disabled=true;btn.textContent='Salvando…';}
  try{
    const all=await dbGetAll('produtos');
    if(all.find(p=>p.codigo===codigo&&p.id!==numId)){
      showMErr('Código já cadastrado.');return;
    }
    const existing=numId?await dbGet('produtos',numId):null;
    let foto=existing?.foto||null;
    if(fotoNova==='__remove__') foto=null;
    else if(fotoNova) foto=fotoNova;
    const obj={codigo,ean,nome,fornecedor,unidade,categoria,gaiola,preco,minimo,leadTime,foto,
      saldo: existing?existing.saldo:saldoIni,
      criadoEm: existing?existing.criadoEm:now()};
    if(numId) obj.id=numId;
    await dbSave('produtos',obj);
    mClose(); navTo('produtos');
  }catch(e){
    showMErr('Erro ao salvar: '+e.message);
    if(btn){btn.disabled=false;btn.textContent='Salvar';}
  }
};
window.delProd=async(id,nome)=>{
  if(!confirm(`Excluir produto "${nome}"?`))return;
  await dbDel('produtos',id);
  navTo('produtos');
};

window.lancarMov=async(tipo)=>{
  const prodId    = +(document.getElementById('eSel')?.value||0);
  const gaiola    = document.getElementById('eGaiola')?.value||null;
  const qtd       = +(document.getElementById('eQ')?.value||0);
  const extra     = (document.getElementById('eO')?.value||'').trim()||null;
  const notaFiscal= (document.getElementById('eNF')?.value||'').trim()||null;
  const lote      = (document.getElementById('eLote')?.value||'').trim()||null;
  const validade  = (document.getElementById('eVal')?.value||'').trim()||null;
  const motivo    = (document.getElementById('eM')?.value||'').trim()||null;
  const obs       = (document.getElementById('eB')?.value||'').trim()||null;
  if(!prodId||!qtd){showPageMsg('eMsg','Selecione o produto e informe a quantidade.');return;}
  const btn=document.querySelector('.btn-g,.btn-r');
  if(btn){btn.disabled=true;}
  try{
    const prod=await dbGet('produtos',prodId);
    if(!prod) throw new Error('Produto não encontrado.');
    if(tipo==='SAÍDA'&&prod.saldo<qtd) throw new Error(`Saldo insuficiente. Saldo atual: ${fmt(prod.saldo,2)}`);
    const novoSaldo=tipo==='ENTRADA'?prod.saldo+qtd:prod.saldo-qtd;
    const origemKey=tipo==='ENTRADA'?'origem':'destino';
    const novaGaiola=tipo==='ENTRADA'?(gaiola||prod.gaiola):prod.gaiola;
    await dbSave('produtos',{...prod,saldo:novoSaldo,gaiola:novaGaiola||null});
    const movObj={tipo,produtoId:prod.id,produtoNome:prod.nome,
      gaiola:novaGaiola||null,qtd,[origemKey]:extra,motivo,obs,data:now()};
    if(tipo==='ENTRADA'){movObj.fornecedor=extra;movObj.notaFiscal=notaFiscal;movObj.lote=lote;movObj.validade=validade;}
    await dbAdd('movimentos',movObj);
    const aviso=tipo==='ENTRADA'&&gaiola&&gaiola!==prod.gaiola?` | Posição atualizada → ${gaiola}`:'';
    showPageMsg('eMsg',`${tipo==='ENTRADA'?'Entrada':'Saída'} registrada! Novo saldo: ${fmt(novoSaldo,2)}${aviso}`,true);
    document.getElementById('eQ').value='';
    document.getElementById('eO').value='';
    ['eNF','eLote','eVal'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
    document.getElementById('eM').value='';
    document.getElementById('eB').value='';
  }catch(e){ showPageMsg('eMsg',e.message); }
  finally{ if(btn){btn.disabled=false;} }
};

PAGES.inventario=async(el)=>{
  const [inv,prods,sel]=await Promise.all([dbGetAll('inventarios'),dbGetAll('produtos'),prodSel('pSel','',`selGaiola('pSel','iGaiola')`)]);
  inv.sort((a,b)=>b.id-a.id);
  // calcula curva ABC dos produtos para filtro
  const totalMov=prods.reduce((s,p)=>s+(p.preco||0)*p.saldo,0)||1;
  const prodsABC=[...prods].sort((a,b)=>((b.preco||0)*b.saldo)-((a.preco||0)*a.saldo));
  let acc=0;const abcMap={};
  prodsABC.forEach(p=>{acc+=((p.preco||0)*p.saldo)/totalMov;abcMap[p.id]=acc<=0.8?'A':acc<=0.95?'B':'C';});
  el.innerHTML=`
    <div class="card" style="max-width:580px;margin-bottom:22px"><div class="ctitle">Lançar Contagem Física</div>
      <div class="fg">
        <div class="fgp full"><label>Produto*</label>${sel}</div>
        <div class="fgp"><label>Posição / Gaiola</label><input id="iGaiola" disabled placeholder="— selecionado automaticamente —" style="background:var(--off)"/></div>
        <div class="fgp"><label>Qtd Física Contada*</label><input id="iQ" type="number" min="0" step="0.01"/></div>
        <div class="fgp"><label>Responsável</label><input id="iR"/></div>
        <div class="fgp full"><label>Observações</label><textarea id="iB"></textarea></div>
      </div>
      <div class="mt12 row"><button class="btn btn-p" onclick="lancarInv()">Lançar Inventário</button><span id="iMsg"></span></div>
    </div>
    <div class="card"><div class="row" style="align-items:center;margin-bottom:10px">
      <div class="ctitle" style="margin:0">Histórico de Inventários</div>
      <div class="row mla" style="gap:6px">
        <span style="font-size:.75rem;color:var(--lt)">Filtrar Curva ABC:</span>
        <button class="btn btn-o btn-sm" onclick="filtInvABC('')">Todos</button>
        <button class="btn btn-sm" style="background:#27ae60;color:#fff" onclick="filtInvABC('A')">A</button>
        <button class="btn btn-sm" style="background:#2980b9;color:#fff" onclick="filtInvABC('B')">B</button>
        <button class="btn btn-sm" style="background:#8e44ad;color:#fff" onclick="filtInvABC('C')">C</button>
      </div></div>
    <div class="tbl-wrap"><table id="tInv">
      <thead><tr><th>Data</th><th>Produto</th><th>ABC</th><th>Gaiola</th><th>Sistema</th><th>Físico</th><th>Diverg.</th><th>Resp.</th></tr></thead>
      <tbody>${inv.length?inv.map(i=>{const abc=abcMap[i.produtoId]||'—';return`<tr data-abc="${abc}">
        <td>${fmtD(i.data)}</td><td>${escH(i.produtoNome)}</td>
        <td><span class="badge" style="background:${abc==='A'?'#27ae60':abc==='B'?'#2980b9':'#8e44ad'};color:#fff">${abc}</span></td>
        <td>${escH(i.gaiola||'—')}</td>
        <td>${fmt(i.saldoSistema,2)}</td><td>${fmt(i.saldoFisico,2)}</td>
        <td class="${i.divergencia<0?'cr':''}" style="font-weight:700">${i.divergencia>0?'+':''}${fmt(i.divergencia,2)}</td>
        <td>${escH(i.responsavel||'—')}</td>
      </tr>`;}
      ).join(''):'<tr><td colspan="8" style="text-align:center;color:var(--lt)">Nenhum inventário lançado.</td></tr>'}
      </tbody></table></div></div>`;
};
window.lancarInv=async()=>{
  const prodId   = +(document.getElementById('pSel')?.value||0);
  const sfStr    = (document.getElementById('iQ')?.value||'');
  const responsavel = (document.getElementById('iR')?.value||'').trim()||null;
  const obs      = (document.getElementById('iB')?.value||'').trim()||null;
  if(!prodId||sfStr===''){showPageMsg('iMsg','Selecione o produto e informe a contagem.');return;}
  const saldoFisico=+sfStr;
  const btn=document.querySelector('#iForm .btn-p');
  if(btn){btn.disabled=true;btn.textContent='Salvando…';}
  try{
    const prod=await dbGet('produtos',prodId);
    if(!prod) throw new Error('Produto não encontrado.');
    const div=saldoFisico-prod.saldo;
    await dbAdd('inventarios',{produtoId:prod.id,produtoNome:prod.nome,gaiola:prod.gaiola,
      saldoSistema:prod.saldo,saldoFisico,divergencia:div,responsavel,obs,data:now()});
    await dbSave('produtos',{...prod,saldo:saldoFisico});
    if(div!==0){
      await dbAdd('movimentos',{tipo:div>0?'ENTRADA':'SAÍDA',produtoId:prod.id,produtoNome:prod.nome,
        gaiola:prod.gaiola,qtd:Math.abs(div),motivo:'Ajuste Inventário',data:now()});
    }
    showPageMsg('iMsg',`Saldo ajustado! Divergência: ${div>0?'+':''}${fmt(div,2)}`,true);
    document.getElementById('iQ').value='';
  }catch(e){ showPageMsg('iMsg',e.message); }
  finally{ if(btn){btn.disabled=false;btn.textContent='Confirmar';} }
};
window.filtInvABC=function(abc){
  document.querySelectorAll('#tInv tbody tr[data-abc]').forEach(tr=>{
    tr.style.display=!abc||tr.dataset.abc===abc?'':'none';
  });
};

let _pedFilt='Todos';
let _pedItens=[];

PAGES.pedidos=async(el)=>{
  const peds=await dbGetAll('pedidos');
  peds.sort((a,b)=>b.id-a.id);
  const stats={Pendente:0,Entregue:0,Cancelado:0};
  peds.forEach(p=>{
    if(p.status==='Pendente'||p.status==='Em Separação') stats.Pendente++;
    else if(stats[p.status]!==undefined) stats[p.status]++;
  });
  const vis=peds.filter(p=>{
    if(_pedFilt==='Todos') return true;
    if(_pedFilt==='Pendente') return p.status==='Pendente'||p.status==='Em Separação';
    return p.status===_pedFilt;
  });
  el.innerHTML=`
    <div class="row" style="margin-bottom:14px;align-items:flex-start;gap:14px">
      <div class="kpi-grid" style="flex:1;margin-bottom:0;grid-template-columns:repeat(3,1fr)">
        ${Object.entries(stats).map(([s,n])=>`<div class="kpi-card" style="padding:12px">
          <div class="kpi-lbl">${s}</div><div class="kpi-val" style="font-size:1.3rem">${n}</div>
        </div>`).join('')}
      </div>
      <button class="btn btn-p" style="white-space:nowrap" onclick="novoPed()">+ Novo Pedido</button>
    </div>
    <div class="row" id="pedFilts" style="margin-bottom:12px;gap:6px">
      ${['Todos','Pendente','Entregue','Cancelado'].map(s=>
        `<button class="btn btn-sm ${_pedFilt===s?'btn-p':'btn-o'}" data-pf="${s}" onclick="setPedF('${s}',this)">${s}</button>`).join('')}
    </div>
    <div id="pedList">${vis.map(renderPC).join('')||'<div class="tlt">Nenhum pedido.</div>'}</div>`;
};

function renderPC(p){
  return`<div class="ped-card">
    <div>
      <div class="ped-num">${escH(p.numero)} ${sBadge(p.status)} ${pBadge(p.prioridade)}</div>
      <div class="ped-info">Solicitante: <strong>${escH(p.solicitante)}</strong> · Setor: <strong>${escH(p.setor)}</strong></div>
      <div class="ped-info">${(p.itens||[]).length} item(ns) · ${fmtD(p.criadoEm)}</div>
    </div>
    <button class="btn btn-o btn-sm" style="white-space:nowrap" onclick="verPed(${p.id})">Ver / Avançar</button>
  </div>`;
}

window.setPedF=(f,btn)=>{
  _pedFilt=f;
  // fix: apenas botões dentro de #pedFilts (não afeta outros .btn-sm)
  document.querySelectorAll('#pedFilts button').forEach(b=>{b.className='btn btn-sm btn-o';b.dataset.pf&&(b.className='btn btn-sm '+(b.dataset.pf===f?'btn-p':'btn-o'));});
  dbGetAll('pedidos').then(peds=>{
    peds.sort((a,b)=>b.id-a.id);
    const vis=peds.filter(p=>f==='Todos'||p.status===f);
    document.getElementById('pedList').innerHTML=vis.map(renderPC).join('')||'<div class="tlt">Nenhum pedido.</div>';
  });
};

window.verPed=async(id)=>{
  const ped=await dbGet('pedidos',id);
  const itens=ped.itens||[];
  const podeAv=CU.perfil==='admin'||CU.perfil==='estoque';
  const fluxo={Pendente:'Em Separação','Em Separação':'Entregue'};
  const nextS=fluxo[ped.status];
  // Busca saldo atual de cada produto para exibir disponibilidade
  const prods=podeAv?await Promise.all(itens.map(i=>dbGet('produtos',i.produtoId))):[];
  const saldoMap={};prods.forEach(p=>{if(p)saldoMap[p.id]=p.saldo;});

  const itensTr=itens.map((it,idx)=>{

    const saldoStr=saldo!=null?`<span style="font-size:.7rem;color:${saldo<pendente?'var(--red)':'var(--lt)'}">est: ${fmt(saldo,2)}</span>`:'';

    <div class="tbl-wrap"><table>

      <tbody>${itensTr}</tbody>
    </table></div>`,

     `);
};

    const ga=prodMap[a.produtoId]?.gaiola||'ZZZ';
    const gb=prodMap[b.produtoId]?.gaiola||'ZZZ';

// Modal de separação parcial: operador define qtd entregue por item
window.abrirSepParcial=async(id)=>{
  const ped=await dbGet('pedidos',id);
  let itens=ped.itens||[];
  const prods=await Promise.all(itens.map(i=>dbGet('produtos',i.produtoId)));
  const prodMap={};prods.forEach(p=>{if(p)prodMap[p.id]=p;});
  const saldoMap={};prods.forEach(p=>{if(p)saldoMap[p.id]=p.saldo;});
  // ordenar por gaiola para facilitar picking
  itens=[...itens].sort((a,b)=>{
    const ga=prodMap[a.produtoId]?.gaiola||'ZZZ';
    const gb=prodMap[b.produtoId]?.gaiola||'ZZZ';
    return ga.localeCompare(gb,undefined,{numeric:true});
  });

  const rows=itens.map((it,i)=>{
    const pendente=Math.max(0,(it.qtd||0)-(it.qtdEntregue||0));
    const saldo=saldoMap[it.produtoId]??0;
    const maxEnt=Math.min(pendente,saldo);
    return`<tr>
      <td style="font-size:.8rem"><strong>${escH(it.produtoNome)}</strong><br/>
        <span style="font-size:.7rem;color:var(--lt)">Solicitado: ${fmt(it.qtd,2)} · Já entregue: ${fmt(it.qtdEntregue||0,2)} · Pendente: ${fmt(pendente,2)}</span><br/>
        <span style="font-size:.7rem;color:${saldo<pendente?'var(--red)':'var(--lt)'}">Estoque disponível: ${fmt(saldo,2)} ${it.unidade}</span>
      </td>
      <td style="width:110px">
        <input type="number" id="sep_${i}" min="0" max="${pendente}" step="0.01" value="${maxEnt}"
          style="width:100%;font-weight:700" ${pendente===0?'disabled':''}/>
      </td>
    </tr>`;
  }).join('');

  mOpen('Registrar Entrega Parcial',`
    <div class="alert al-w" style="margin-bottom:12px">Informe a quantidade realmente entregue de cada item. Deixe <strong>0</strong> para itens não disponíveis.</div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Produto</th><th>Qtd Entregando</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`,
    `<button class="btn btn-o" onclick="mClose()">Cancelar</button>
     <button class="btn btn-g" onclick="confirmarSepParcial(${id},${JSON.stringify(itens.map((_,i)=>i))})">Confirmar Entrega</button>`);
};

window.confirmarSepParcial=async(id,indices)=>{
  const ped=await dbGet('pedidos',id);
  const itens=[...ped.itens||[]];
  let algumEntregue=false;
  const btn=document.querySelector('#mFoot .btn-g');
  if(btn){btn.disabled=true;btn.textContent='Salvando…';}
  try{
    for(const i of indices){
      const inp=document.getElementById(`sep_${i}`);
      if(!inp||inp.disabled)continue;
      const qtdNova=Math.max(0,parseFloat(inp.value)||0);
      if(qtdNova===0)continue;
      const prod=await dbGet('produtos',itens[i].produtoId);
      if(!prod)continue;
      const baixa=Math.min(qtdNova,prod.saldo);
      if(baixa<=0)continue;
      itens[i].qtdEntregue=(itens[i].qtdEntregue||0)+baixa;
      await dbSave('produtos',{...prod,saldo:prod.saldo-baixa});
      await dbAdd('movimentos',{tipo:'SAÍDA',produtoId:prod.id,produtoNome:prod.nome,
        gaiola:prod.gaiola,qtd:baixa,destino:ped.setor,motivo:'Pedido — Entrega Parcial',
        obs:`Pedido ${ped.numero} — ${ped.solicitante}`,data:now()});
      algumEntregue=true;
    }
    if(!algumEntregue){showMErr('Nenhuma quantidade informada.');if(btn){btn.disabled=false;btn.textContent='Confirmar Entrega';}return;}
    // Verifica se todos os itens foram totalmente entregues
    const todosConcluidos=itens.every(it=>(it.qtdEntregue||0)>=(it.qtd||0));
    const novoStatus=todosConcluidos?'Entregue':'Em Separação';
    const pedAtualizado={...ped,itens,status:novoStatus,atualizadoEm:now()};
    await dbSave('pedidos',pedAtualizado);
    notificarSolicitante(pedAtualizado,novoStatus);
    mClose();navTo('pedidos');
  }catch(e){showMErr(e.message);if(btn){btn.disabled=false;btn.textContent='Confirmar Entrega';}}
};

window.confirmarEntregaParcial=async(id)=>{

  const pendentes=(ped.itens||[]).filter(it=>(it.qtd||0)-(it.qtdEntregue||0)>0);

  mOpen('Finalizar com itens pendentes',`
    <div class="alert al-w" style="margin-bottom:12px">⚠️ Ainda há itens não entregues neste pedido:</div>
    <pre style="font-size:.82rem;color:var(--tx);background:var(--card-bg);padding:10px;border-radius:6px;white-space:pre-wrap;margin-bottom:4px">${escH(lista)}</pre>
    <div style="font-size:.82rem;color:var(--lt);margin-top:8px">Deseja finalizar mesmo assim? O pedido será marcado como <strong>Entregue (parcial)</strong>.</div>`,

window.salvarPed=async(numero)=>{
  const solicitante = (document.getElementById('pSolic')?.value||'').trim();
  const setor       = (document.getElementById('pSetor')?.value||'').trim();
  const prioridade  = document.getElementById('pPrior')?.value||'Normal';
  const obs         = (document.getElementById('pObs')?.value||'').trim()||null;
  if(!solicitante||!setor){showMErr('Informe solicitante e setor.');return;}
  const itens=_pedItens.filter(i=>i.produtoId&&i.qtd>0);
  if(!itens.length){showMErr('Adicione ao menos 1 item válido.');return;}
  const btn=document.querySelector('#mFoot .btn-p');
  if(btn){btn.disabled=true;btn.textContent='Salvando…';}
  try{
    for(const it of itens){
      const p=await dbGet('produtos',it.produtoId);
      it.produtoNome=p?.nome||'';
      it.unidade=p?.unidade||'UN';
      it.qtdEntregue=null;
    }
    const pedObj={numero,solicitante,setor,prioridade,obs,
      solicitanteEmail:CU?.email||null,
      status:'Pendente',itens,criadoEm:now(),atualizadoEm:now()};
    await dbAdd('pedidos',pedObj);
    notificarEstoque(pedObj);
    notificarSolicitante(pedObj,'Pendente');
    atualizarBadgePedidos();
    mClose(); navTo('pedidos');
  }catch(e){
    showMErr('Erro ao salvar: '+e.message);
    if(btn){btn.disabled=false;btn.textContent='Salvar';}
  }
};

        <td>${escH(m.produtoNome)}</td><td>${escH(m.gaiola||'—')}</td>
        <td>${fmt(m.qtd,2)}</td><td>${escH(m.origem||'—')}</td><td>${escH(m.destino||'—')}</td><td>${escH(m.motivo||'—')}</td>
      </tr>`).join(''):'<tr><td colspan="8" style="text-align:center;color:var(--lt)">Nenhum resultado.</td></tr>'}

window.expCSV=()=>{
  if(!_histData.length){alert('Filtre o histórico primeiro.');return;}
  const h='Data,Tipo,Produto,Gaiola,Qtd,Origem,Destino,Motivo';
  const rows=_histData.map(m=>[fmtD(m.data),m.tipo,`"${m.produtoNome}"`,m.gaiola||'',m.qtd,m.origem||'',m.destino||'',m.motivo||''].join(','));
  const blob=new Blob([h+'\n'+rows.join('\n')],{type:'text/csv;charset=utf-8'});
  const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:'historico_mro.csv'});
  a.click();
};
